version: '3.9'

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: hestia-postgres
    environment:
      POSTGRES_USER: hestia
      POSTGRES_PASSWORD: hestia
      POSTGRES_DB: hestia
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - hestia-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hestia"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hestia-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - hestia-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: hestia-api
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://hestia:hestia@postgres:5432/hestia
      DATABASE_SSL: "false"
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-secret-change-in-production
      JWT_EXPIRY: 7d
      CORS_ORIGIN: http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
    networks:
      - hestia-net

volumes:
  postgres_data:
  redis_data:

networks:
  hestia-net:
    driver: bridge
