version: '3.9'

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: hestia-postgres
    environment:
      POSTGRES_USER: hestia
      POSTGRES_PASSWORD: hestia
      POSTGRES_DB: hestia
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - hestia-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hestia"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hestia-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - hestia-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend-dotnet
      dockerfile: Dockerfile
    container_name: hestia-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      PORT: "5000"
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=hestia;Username=hestia;Password=hestia"
      JwtSettings__Secret: "dev-secret-change-in-production-min-32-chars"
      JwtSettings__ExpiryHours: "168"
      CorsSettings__AllowedOrigin: "http://localhost:3001"
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - hestia-net

volumes:
  postgres_data:
  redis_data:

networks:
  hestia-net:
    driver: bridge
