name: Hestia CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (.NET 9)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Restore
        run: dotnet restore
        working-directory: backend-dotnet
      - name: Build
        run: dotnet build --no-restore -c Release
        working-directory: backend-dotnet
      - name: Test
        run: dotnet test --no-build -c Release --verbosity normal
        working-directory: backend-dotnet

  frontend-web:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/web/package-lock.json
      - name: Install
        run: npm ci
        working-directory: frontend/web
      - name: Build
        run: npm run build
        working-directory: frontend/web

  frontend-mobile:
    name: Mobile (Expo)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/mobile/package-lock.json
      - name: Install
        run: npm ci
        working-directory: frontend/mobile
      - name: Type Check
        run: npx tsc --noEmit
        working-directory: frontend/mobile

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build API Image
        run: docker build -t hestia-api:test ./backend-dotnet
